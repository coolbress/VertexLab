repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.6
    hooks:
      - id: ruff-check
        args: ["packages/", "--exclude", "legacy_code"]
      - id: ruff-format
  - repo: https://github.com/lycheeverse/lychee
    rev: v0.15.1
    hooks:
      - id: lychee
        name: Markdown link checker
        args: ["--verbose", "--no-progress", "--max-concurrency", "8", "packages/vertex-forager/docs/**/*.md", "README.md"]
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        name: Detect secrets
        args: ["--baseline", ".secrets.baseline"]
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        additional_dependencies: ["types-requests"]
        args: ["--strict", "packages/vertex-forager/src"]
        pass_filenames: false
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        files: "\\.(yml|yaml)$"
        args: ["-s"]
  - repo: local
    hooks:
      - id: hotspot-diff-check
        name: Hotspot diff check against origin/main
        entry: python3 scripts/precommit_hotspot_check.py
        language: system
        pass_filenames: false
