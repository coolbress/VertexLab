[mypy]
python_version = 3.10
ignore_missing_imports = False
warn_unused_ignores = True
warn_redundant_casts = True
warn_unused_configs = True
strict_optional = True
no_implicit_optional = True
exclude = ^packages/vertex-forager/src/vertex_forager/cli\.py$|^packages/vertex-forager/src/vertex_forager/providers/.*/schema\.py$|^packages/vertex-forager/legacy_code/.*

[mypy-nest_asyncio.*]
ignore_missing_imports = True

[mypy-IPython.*]
ignore_missing_imports = True

[mypy-ipywidgets.*]
ignore_missing_imports = True

[mypy-yfinance.*]
ignore_missing_imports = True

[mypy-vertex_forager.*]
check_untyped_defs = True
disallow_any_generics = False
disallow_any_unimported = False
disallow_any_explicit = False
disallow_any_decorated = False

[mypy-vertex_forager.tests.*]
ignore_errors = False

[mypy-vertex_forager.cli]
ignore_missing_imports = True
