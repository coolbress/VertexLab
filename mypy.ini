[mypy]
python_version = 3.10
ignore_missing_imports = False
warn_unused_ignores = True
warn_redundant_casts = True
warn_unused_configs = True
strict_optional = True
no_implicit_optional = True
exclude = ^packages/vertex-forager/src/vertex_forager/cli.py$|^packages/vertex-forager/src/vertex_forager/providers/.*/schema\.py$|^packages/vertex-forager/legacy_code/.*|^packages/vertex-forager/tests/(?!integration/test_client\.py$|integration/test_factory\.py$|integration/test_pagination\.py$|unit/test_http_executor\.py$|writers/test_duckdb_identifiers\.py$|unit/test_pipeline\.py$|unit/test_duckdb_writer\.py$|unit/test_router\.py$|unit/test_router_submodules\.py$|unit/test_utils\.py$|unit/test_sharadar_init_lazy_import\.py$|unit/test_core_init_lazy_import\.py$|integration/test_router_factory\.py$|unit/test_yfinance_client\.py$|unit/test_clients_validation\.py$|unit/test_yfinance_router\.py$|verification/verify_duckdb_upsert\.py$|conftest\.py$).*

[mypy-nest_asyncio.*]
ignore_missing_imports = True

[mypy-IPython.*]
ignore_missing_imports = True

[mypy-ipywidgets.*]
ignore_missing_imports = True

[mypy-yfinance.*]
ignore_missing_imports = True

[mypy-vertex_forager.*]
check_untyped_defs = True
disallow_any_generics = False
disallow_any_unimported = False
disallow_any_explicit = False
disallow_any_decorated = False

[mypy-vertex_forager.tests.*]
ignore_errors = False
disable_error_code = var-annotated,unused-ignore,index,union-attr,operator,method-assign,arg-type

[mypy-vertex_forager.cli]
ignore_missing_imports = True
