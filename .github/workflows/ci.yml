---
name: Vertex CI
#
# Policy: Actions are SHA-pinned; the inline comment reflects the upstream major version.
# This workflow enforces bounded runtime via timeout-minutes to avoid long hangs.

# 언제 로봇이 깨어날까요?
on:
  push:
    branches: [main]  # main 브랜치에 코드가 올라올 때
  pull_request:
    branches: [main]  # 누군가(혹은 내가) merge 요청을 보낼 때
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-check:
    name: 🛡️ Code Quality Check
    runs-on: ubuntu-latest  # 최신 리눅스 환경에서 실행
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
      actions: read
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      VF_STRUCTURED_LOGS: "1"
      VF_LOG_VERBOSE: "0"
      VF_METRICS_ENABLED: "0"
      VENV: ${{ github.workspace }}/verify-wheel
    steps:
      - name: Checkout code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5 pinned
      - name: Cache uv download/build artifacts
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306  # v5.0.3 pinned
        with:
          path: |
            ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('**/pyproject.toml', 'packages/**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v5 pinned

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v5 pinned
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: uv sync  # 라이브러리 설치 테스트
      - name: Compute cache window
        id: cache_window
        run: echo "week=$(date +'%G-%V')" >> "$GITHUB_OUTPUT"
      - name: Cache Trivy DB
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306  # v5.0.3 pinned
        with:
          path: |
            ~/.cache/trivy
          key: ${{ runner.os }}-trivy-db-${{ steps.cache_window.outputs.week }}
          restore-keys: |
            ${{ runner.os }}-trivy-db-${{ steps.cache_window.outputs.week }}
            ${{ runner.os }}-trivy-db
      - name: Trivy FS Scan (SARIF)
        id: trivy
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1  # 0.16.1 pinned
        with:
          scan-type: fs
          trivyignores: .trivyignore
          scanners: secret,misconfig
          severity: MEDIUM,HIGH,CRITICAL
          format: sarif
          output: trivy-results.sarif
          exit-code: 0
          skip-dirs: ".hypothesis,.ruff_cache,data,output,packages/vertex-forager/legacy_code,.venv,.tox,.cache,build,dist,node_modules"
        env:
          TRIVY_SKIP_VERSION_CHECK: "true"
          TRIVY_CACHE_DIR: ~/.cache/trivy
      - name: Upload Trivy SARIF to Security tab
        if: ${{ always() && github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        uses: github/codeql-action/upload-sarif@b1bff81932f5cdfc8695c7752dcee935dcd061c8  # v4 pinned
        with:
          sarif_file: trivy-results.sarif
      - name: Enforce Trivy Gate (HIGH/CRITICAL)
        run: |
          if [ ! -f trivy-results.sarif ]; then
            echo "::error::trivy-results.sarif not found"
            exit 1
          fi
          if command -v jq >/dev/null 2>&1; then
            ERRORS=$(jq '[.runs[].results[] | select(.level=="error")] | length' trivy-results.sarif)
          else
            ERRORS=$(
              (
                grep -oP '"level"\s*:\s*"error"' trivy-results.sarif || true
              ) | wc -l | tr -d ' '
            )
          fi
          echo "Trivy HIGH/CRITICAL findings: $ERRORS"
          if [ "$ERRORS" -gt 0 ]; then
            exit 1
          fi
      - name: Remediation Hints (On Failure)
        if: ${{ failure() }}
        run: |
          echo "::group::Remediation Guidance"
          echo "See docs/ci-security.md for triage, severity thresholds, and SLA."
          echo "Common fixes:"
          echo " - Secrets/config: move to env/CI secrets, rotate, remove from history"
          echo " - Dependencies: upgrade vulnerable packages"
          echo "::endgroup::"

      - name: Check Import Cycles
        run: python3 scripts/check_cycles.py

      - name: Lint Code (Ruff)
        # packages 폴더 안에 있는 모든 코드를 검사 (legacy_code 제외)
        run: uv run ruff check packages/ --exclude "legacy_code"

      - name: Lint (Ruff Tier-2 Warnings)
        continue-on-error: true
        run: |
          uv run ruff check packages/ \
            --exclude "legacy_code" \
            --select C4,PT,TCH,SIM,TC

      - name: YAML Lint
        run: |
          uv run yamllint -c .yamllint .github/workflows/ \
            && uv run yamllint -c .yamllint packages/vertex-forager/mkdocs.yml

      - name: Run Tests (Pytest with Coverage Gate)
        run: uv run pytest packages/ --tb=short --cov=packages/vertex-forager/src/vertex_forager/core --cov=packages/vertex-forager/src/vertex_forager/clients --cov=packages/vertex-forager/src/vertex_forager/writers --cov=packages/vertex-forager/src/vertex_forager/routers --cov-report=term --cov-fail-under=80
      - name: Build sdist and wheel (vertex-forager)
        run: |
          pushd packages/vertex-forager
          OUT="$GITHUB_WORKSPACE/dist/vertex-forager"
          mkdir -p "$OUT"
          uv build --out-dir "$OUT"
          ls -l "$OUT"
          popd
      - name: Smoke install built wheel
        run: |
          pushd packages/vertex-forager
          OUT="$GITHUB_WORKSPACE/dist/vertex-forager"
          WHEEL="$(find "$OUT" -maxdepth 1 -type f -name '*.whl' -print -quit)"
          if [ -z "$WHEEL" ]; then
            echo "No wheel found in $OUT"
            exit 1
          fi
          python -m venv "$VENV"
          "$VENV/bin/pip" install --upgrade pip
          "$VENV/bin/pip" install "$WHEEL"
          "$VENV/bin/python" - <<'PY'
          import importlib
          import sys
          m = importlib.import_module("vertex_forager")
          print("import ok:", m.__name__)
          PY
          popd
      - name: pip-audit (fails on any vulnerability)
        uses: pypa/gh-action-pip-audit@1220774d901786e6f652ae159f7b6bc8fea6d266  # v1.1.0 pinned
        with:
          virtual-environment: ${{ env.VENV }}
