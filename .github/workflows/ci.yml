name: Vertex CI
#
# Policy: Actions are SHA-pinned; the inline comment reflects the upstream major version.
# This workflow enforces bounded runtime via timeout-minutes to avoid long hangs.

# 언제 로봇이 깨어날까요?
on:
  push:
    branches: [ main ]  # main 브랜치에 코드가 올라올 때
  pull_request:
    branches: [ main ]  # 누군가(혹은 내가) merge 요청을 보낼 때

jobs:
  quality-check:
    name: 🛡️ Code Quality Check
    runs-on: ubuntu-latest  # 최신 리눅스 환경에서 실행
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write
      actions: read
    env:
      VF_STRUCTURED_LOGS: "1"
      VF_LOG_VERBOSE: "0"
      VF_METRICS_ENABLED: "0"
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v4 pinned

      - name: Install uv
        uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098  # v5 pinned

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v5 pinned
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: uv sync  # 라이브러리 설치 테스트
      - name: Trivy FS Scan (Config + Secrets, SARIF)
        id: trivy-sarif
        uses: aquasecurity/trivy-action@97e0b3872f55f89b95b2f65b3dbab56962816478  # 0.16.1 pinned
        with:
          scan-type: fs
          trivyignores: .trivyignore
          scanners: secret,config
          severity: HIGH,CRITICAL
          format: sarif
          output: trivy-results.sarif
          skip-dirs: ".hypothesis,.ruff_cache,data,output,packages/vertex-forager/legacy_code"
      - name: Check Trivy SARIF presence
        run: |
          if [ -f trivy-results.sarif ]; then
            echo "TRIVY_SARIF_EXISTS=true" >> "$GITHUB_ENV"
          else
            echo "TRIVY_SARIF_EXISTS=false" >> "$GITHUB_ENV"
          fi
      - name: Upload Trivy SARIF to Security tab
        if: ${{ always() && env.TRIVY_SARIF_EXISTS == 'true' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
        uses: github/codeql-action/upload-sarif@c793b717bc78562f491db7b0e93a3a178b099162  # v4 pinned
        with:
          sarif_file: trivy-results.sarif
      - name: Trivy FS Scan (Table Gate)
        uses: aquasecurity/trivy-action@97e0b3872f55f89b95b2f65b3dbab56962816478  # 0.16.1 pinned
        with:
          scan-type: fs
          trivyignores: .trivyignore
          scanners: secret,config
          severity: HIGH,CRITICAL
          format: table
          exit-code: 1
          skip-dirs: ".hypothesis,.ruff_cache,data,output,packages/vertex-forager/legacy_code"
      - name: Remediation Hints (On Failure)
        if: ${{ failure() }}
        run: |
          echo "::group::Remediation Guidance"
          echo "See docs/ci-security.md for triage, severity thresholds, and SLA."
          echo "Common fixes:"
          echo " - Secrets/config: move to env/CI secrets, rotate, remove from history"
          echo " - Dependencies: upgrade vulnerable packages"
          echo "::endgroup::"
      
      - name: Check Import Cycles
        run: python3 scripts/check_cycles.py

      - name: Lint Code (Ruff)
        # packages 폴더 안에 있는 모든 코드를 검사 (legacy_code 제외)
        run: uv run ruff check packages/ --exclude "legacy_code"

      - name: Run Tests (Pytest with Coverage Gate)
        run: uv run pytest packages/ --tb=short --cov=packages/vertex-forager/src/vertex_forager/core --cov=packages/vertex-forager/src/vertex_forager/clients --cov=packages/vertex-forager/src/vertex_forager/writers --cov=packages/vertex-forager/src/vertex_forager/routers --cov-report=term --cov-fail-under=80
