name: Vertex CI

# 언제 로봇이 깨어날까요?
on:
  push:
    branches: [ main ]  # main 브랜치에 코드가 올라올 때
  pull_request:
    branches: [ main ]  # 누군가(혹은 내가) merge 요청을 보낼 때

jobs:
  quality-check:
    name: 🛡️ Code Quality Check
    runs-on: ubuntu-latest  # 최신 리눅스 환경에서 실행
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v4 pinned

      - name: Install uv
        uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098  # v5 pinned

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v5 pinned
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: uv sync  # 라이브러리 설치 테스트
      
      - name: Trivy FS Scan (Config + Secrets)
        uses: aquasecurity/trivy-action@97e0b3872f55f89b95b2f65b3dbab56962816478  # 0.16.1 pinned
        with:
          scan-type: fs
          ignorefile: .trivyignore
          scanners: secret,config
          severity: HIGH,CRITICAL
          format: table
          exit-code: 1
          skip-dirs: ".hypothesis,.ruff_cache,data,output,packages/vertex-forager/legacy_code"
      
      - name: Check Import Cycles
        run: python3 scripts/check_cycles.py

      - name: Lint Code (Ruff)
        # packages 폴더 안에 있는 모든 코드를 검사 (legacy_code 제외)
        run: uv run ruff check packages/ --exclude "legacy_code"

      - name: Run Tests (Pytest with Coverage Gate)
        run: uv run pytest packages/ --tb=short --cov=packages/vertex-forager/src/vertex_forager/core --cov=packages/vertex-forager/src/vertex_forager/clients --cov=packages/vertex-forager/src/vertex_forager/writers --cov=packages/vertex-forager/src/vertex_forager/routers --cov-report=term --cov-fail-under=80
