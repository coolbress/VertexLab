name: Type Check
#
# Policy: Actions are SHA-pinned; the inline comment reflects the upstream major version.
# This workflow sets explicit timeout-minutes to prevent long-hanging jobs.

on:
  push:
    branches: [main, "refactor/**", "feature/**"]
  pull_request:
    branches: [main]

jobs:
  mypy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4 pinned

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v5 pinned
        with:
          python-version: "3.10"

      - name: Install uv
        uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v5 pinned
        with:
          version: "0.5.29"

      - name: Sync dependencies
        run: |
          uv sync --group dev

      - name: Run mypy (vertex-forager)
        run: |
          uv run mypy packages/vertex-forager
