name: Type Check

on:
  push:
    branches: [ main, "refactor/**", "feature/**" ]
  pull_request:
    branches: [ main ]

jobs:
  mypy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Sync dependencies
        run: |
          uv sync --group dev

      - name: Run mypy (vertex-forager)
        run: |
          uv run mypy packages/vertex-forager
