---
name: ruff-tier2-report

on:
  schedule:
    - cron: "0 9 1 * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.10"
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78
      - name: Install deps
        run: uv sync
      - name: Tier-2 Ruff report (C4/PT/TCH/SIM/TC)
        id: ruff_tier2
        continue-on-error: true
        run: |
          set -euo pipefail
          OUT="$RUNNER_TEMP/ruff-tier2.txt"
          uv run ruff check packages/ \
            --exclude "legacy_code" \
            --select C4,PT,TCH,SIM,TC \
            --statistics || true | tee "$OUT"
          {
            echo "# Ruff Tier-2 Report (C4/PT/TCH/SIM/TC)"
            echo
            echo '```'
            cat "$OUT"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@834a144ee995460fba8ed112a2fc961b36a5ec19
        with:
          name: ruff-tier2-statistics
          path: ${{ runner.temp }}/ruff-tier2.txt
