name: Issue Form Auto Labeler
on:
  issues:
    types: [opened, edited]
concurrency:
  group: issue-label-${{ github.event.issue.number || github.run_id }}
  cancel-in-progress: true
permissions:
  contents: read
  issues: write
jobs:
  apply-labels:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const body = (context.payload.issue && context.payload.issue.body) || "";
            function extractField(label) {
              const patterns = [
                new RegExp(`${label}\\s*\\n+([^\\n#-].*)`, "i"),
                new RegExp(`${label}\\s*:\\s*([^\\n#-].*)`, "i"),
              ];
              for (const re of patterns) {
                const m = body.match(re);
                if (m && m[1]) return m[1].trim();
              }
              return null;
            }
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.issue.number;
            const allowedSeverity = new Set(["critical","high","medium","low"]);
            const allowedPriority = new Set(["P1","P2","P3","P4"]);
            let severityRaw = extractField("Severity");
            let priorityRaw = extractField("Priority");
            let severityLabel = null;
            let priorityLabel = null;
            if (severityRaw) {
              const sev = String(severityRaw).toLowerCase();
              if (allowedSeverity.has(sev)) {
                severityLabel = `severity/${sev}`;
              }
            }
            if (priorityRaw) {
              const pri = String(priorityRaw).toUpperCase();
              if (allowedPriority.has(pri)) {
                priorityLabel = `priority/${pri}`;
              }
            }
            const current = await github.rest.issues.listLabelsOnIssue({ owner, repo, issue_number });
            const currentNames = new Set(current.data.map(l => l.name));
            async function addIfMissing(name) {
              if (!name) return;
              if (!currentNames.has(name)) {
                await github.rest.issues.addLabels({ owner, repo, issue_number, labels: [name] });
                currentNames.add(name);
              }
            }
            async function removeOthers(prefix, keep) {
              for (const n of Array.from(currentNames)) {
                if (n.startsWith(prefix) && n !== keep) {
                  try {
                    await github.rest.issues.removeLabel({ owner, repo, issue_number, name: n });
                    currentNames.delete(n);
                  } catch (e) {
                    // ignore missing
                  }
                }
              }
            }
            if (severityLabel) {
              await addIfMissing(severityLabel);
              await removeOthers("severity/", severityLabel);
            }
            if (priorityLabel) {
              await addIfMissing(priorityLabel);
              await removeOthers("priority/", priorityLabel);
            }
