name: CodeQL
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: "0 3 * * 1"  # Every Monday at 03:00 UTC
permissions:
  contents: read
  security-events: write
jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: github/codeql-action/init@7aefa1c9aed02ae41531ec219164e64a0f087410
        with:
          languages: python
      - uses: github/codeql-action/analyze@7aefa1c9aed02ae41531ec219164e64a0f087410
