name: Sync Severity/Priority Labels
on:
  push:
    branches: [ main ]
    paths:
      - ".github/workflows/labels-sync.yml"
  workflow_dispatch:
permissions:
  contents: read
  issues: write
  pull-requests: write
jobs:
  sync-labels:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Ensure severity/priority labels exist
        env:
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          api() {
            method="$1"; url="$2"; data="${3-}"
            if [ -n "$data" ]; then
              curl -fsS -X "$method" "$url" \
                -H "Authorization: Bearer $GH_TOKEN" \
                -H "Accept: application/vnd.github+json" \
                -d "$data" >/dev/null
            else
              curl -fsS -X "$method" "$url" \
                -H "Authorization: Bearer $GH_TOKEN" \
                -H "Accept: application/vnd.github+json" >/dev/null
            fi
          }
          create_or_update() {
            name="$1"; color="$2"; desc="$3"
            enc_name="$(python3 -c "import urllib.parse,sys; import sys as s; print(urllib.parse.quote(s.argv[1], safe=''))" "$name")"
            # Try PATCH (update or rename if exists)
            if ! api PATCH "https://api.github.com/repos/$REPO/labels/$enc_name" "{\"new_name\":\"$name\",\"color\":\"$color\",\"description\":\"$desc\"}"; then
              # If PATCH fails (likely 404), try create
              api POST "https://api.github.com/repos/$REPO/labels" "{\"name\":\"$name\",\"color\":\"$color\",\"description\":\"$desc\"}" || true
            fi
          }
          python3 -c 'print("\n".join([
            "severity/critical|d73a4a|Critical severity issue",
            "severity/high|b60205|High severity issue",
            "severity/medium|fbca04|Medium severity issue",
            "severity/low|0e8a16|Low severity issue",
            "priority/P1|d73a4a|Highest priority",
            "priority/P2|b60205|High priority",
            "priority/P3|fbca04|Medium priority",
            "priority/P4|0e8a16|Low priority"
          ]))' | while IFS='|' read -r n c d; do
            create_or_update "$n" "$c" "$d"
          done
