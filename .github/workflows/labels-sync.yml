name: Sync Severity/Priority Labels
on:
  push:
    branches: [ main ]
    paths:
      - ".github/workflows/labels-sync.yml"
  workflow_dispatch:
permissions:
  contents: read
  issues: write
  pull-requests: write
jobs:
  sync-labels:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Ensure severity/priority labels exist
        env:
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          labels='[
            {"name":"severity/critical","color":"d73a4a","description":"Critical severity issue"},
            {"name":"severity/high","color":"b60205","description":"High severity issue"},
            {"name":"severity/medium","color":"fbca04","description":"Medium severity issue"},
            {"name":"severity/low","color":"0e8a16","description":"Low severity issue"},
            {"name":"priority/P1","color":"d73a4a","description":"Highest priority"},
            {"name":"priority/P2","color":"b60205","description":"High priority"},
            {"name":"priority/P3","color":"fbca04","description":"Medium priority"},
            {"name":"priority/P4","color":"0e8a16","description":"Low priority"}
          ]'
          api() {
            method="$1"; url="$2"; data="${3-}"
            if [ -n "$data" ]; then
              curl -fsS -X "$method" "$url" \
                -H "Authorization: Bearer $GH_TOKEN" \
                -H "Accept: application/vnd.github+json" \
                -d "$data" >/dev/null
            else
              curl -fsS -X "$method" "$url" \
                -H "Authorization: Bearer $GH_TOKEN" \
                -H "Accept: application/vnd.github+json" >/dev/null
            fi
          }
          create_or_update() {
            name="$1"; color="$2"; desc="$3"
            enc_name="$(python3 - <<PY
import urllib.parse, sys
print(urllib.parse.quote(sys.argv[1], safe=''))
PY
"$name")"
            # Try PATCH (update or rename if exists)
            if ! api PATCH "https://api.github.com/repos/$REPO/labels/$enc_name" "{\"new_name\":\"$name\",\"color\":\"$color\",\"description\":\"$desc\"}"; then
              # If PATCH fails (likely 404), try create
              api POST "https://api.github.com/repos/$REPO/labels" "{\"name\":\"$name\",\"color\":\"$color\",\"description\":\"$desc\"}" || true
            fi
          }
          python3 - <<'PY' > /tmp/labels.json
import json, sys
labels = [
  {"name":"severity/critical","color":"d73a4a","description":"Critical severity issue"},
  {"name":"severity/high","color":"b60205","description":"High severity issue"},
  {"name":"severity/medium","color":"fbca04","description":"Medium severity issue"},
  {"name":"severity/low","color":"0e8a16","description":"Low severity issue"},
  {"name":"priority/P1","color":"d73a4a","description":"Highest priority"},
  {"name":"priority/P2","color":"b60205","description":"High priority"},
  {"name":"priority/P3","color":"fbca04","description":"Medium priority"},
  {"name":"priority/P4","color":"0e8a16","description":"Low priority"},
]
print(json.dumps(labels))
PY
          for row in $(python3 - <<'PY'
import json
for item in json.load(open('/tmp/labels.json')):
    print('|'.join([item['name'], item['color'], item['description'].replace('|','/')]))
PY
); do
            IFS='|' read -r n c d <<< "$row"
            create_or_update "$n" "$c" "$d"
          done
