name: Dependabot Auto Merge
#
# Auto-merge for Dependabot PRs only.
# Conditions:
# - author is dependabot[bot]
# - dependencies label is present
# - base branch is main
# Auto-merge is enabled with squash; native GitHub auto-merge waits for required checks.

on:
  pull_request:
    types: [opened, synchronize, labeled, unlabeled, ready_for_review]

concurrency:
  group: automerge-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  automerge:
    if: |
      github.event.pull_request.user.login == 'dependabot[bot]' &&
      github.event.pull_request.base.ref == 'main'
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5 pinned
        with:
          fetch-depth: 0
      - name: Restrict to workflow changes only
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          CHANGED_ALL="$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")"
          WF_ONLY="$(echo "$CHANGED_ALL" | grep -E '^\.github/workflows/' || true)"
          OTHER="$(echo "$CHANGED_ALL" | grep -vE '^\.github/workflows/' || true)"
          if [ -n "$WF_ONLY" ] && [ -z "$OTHER" ]; then
            echo "WORKFLOW_ONLY=true" >> "$GITHUB_ENV"
          else
            echo "WORKFLOW_ONLY=false" >> "$GITHUB_ENV"
          fi
      - name: Enable auto-merge (squash) when dependencies label present
        if: ${{ env.WORKFLOW_ONLY == 'true' && contains(github.event.pull_request.labels.*.name, 'dependencies') }}
        run: gh pr merge ${{ github.event.pull_request.number }} --squash --auto
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Disable auto-merge when dependencies label removed
        if: ${{ env.WORKFLOW_ONLY == 'false' || !contains(github.event.pull_request.labels.*.name, 'dependencies') }}
        run: |
          PR_ID="$(gh pr view ${{ github.event.pull_request.number }} --json id --jq .id)"
          # shellcheck disable=SC2016
          gh api graphql -f query='mutation($prId:ID!) { disablePullRequestAutoMerge(input:{pullRequestId:$prId}) { clientMutationId } }' -F prId="$PR_ID"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
