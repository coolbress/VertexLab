name: PR Labeler
on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]
concurrency:
  group: pr-label-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true
permissions:
  contents: read
  issues: write
  pull-requests: write
jobs:
  label:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - id: labeler
        continue-on-error: true
        uses: actions/labeler@634933edcd8ababfe52f92936142cc22ac488b1b # v6.0.1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          sync-labels: true
          configuration-path: .github/labeler.yml
      - name: Add type:* label from PR title
        if: ${{ always() }}
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const pr = context.payload.pull_request;
            if (!pr) return;
            const title = (pr.title || '').toLowerCase().trim();
            const map = {
              'feat:': 'type:feat',
              'fix:': 'type:fix',
              'chore:': 'type:chore',
              'docs:': 'type:docs',
              'refactor:': 'type:refactor',
              'perf:': 'type:perf',
              'test:': 'type:test'
            };
            const m = title.match(/^(feat|fix|chore|docs|refactor|perf|test)(\([^)]+\))?:\s/);
            let chosen = null;
            if (m && m[1]) {
              chosen = `type:${m[1]}`;
            } else {
              for (const prefix of Object.keys(map)) {
                if (title.startsWith(prefix)) { chosen = map[prefix]; break; }
              }
            }
            if (!chosen) {
              core.info('No type:* inferred from title');
              return;
            }
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            // Ensure label exists at repo level
            const all = await github.paginate(github.rest.issues.listLabelsForRepo, { owner, repo, per_page: 100 });
            const exists = all.find(l => (l.name || '').toLowerCase() === chosen);
            if (!exists) {
              try {
                await github.rest.issues.createLabel({
                  owner, repo, name: chosen, color: 'ededed', description: 'Auto-created type label'
                });
              } catch (e) {
                core.warning(`Failed creating label ${chosen}: ${e.message || e}`);
              }
            }
            // Sync labels on the PR
            const number = pr.number;
            const current = await github.rest.issues.listLabelsOnIssue({ owner, repo, issue_number: number });
            const currentNames = new Set(current.data.map(l => l.name));
            for (const name of currentNames) {
              if (name.startsWith('type:') && name !== chosen) {
                await github.rest.issues.removeLabel({ owner, repo, issue_number: number, name }).catch(()=>{});
              }
            }
            if (!currentNames.has(chosen)) {
              await github.rest.issues.addLabels({ owner, repo, issue_number: number, labels: [chosen] }).catch((e)=>{
                core.warning(`Failed adding label ${chosen} to PR #${number}: ${e.message || e}`);
              });
            }
      - name: Fallback labeler via github-script
        if: ${{ steps.labeler.outcome == 'failure' }}
        id: fallback
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pr = context.payload.pull_request;
            if (!pr) {
              core.warning('No pull_request payload, skipping fallback labeler');
              return;
            }
            const number = pr.number;
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner, repo, pull_number: number, per_page: 100,
            });
            const labels = new Set();
            for (const f of files) {
              const p = f.filename || '';
              if (p.startsWith('docs/') || p === 'README.md') labels.add('area:docs');
              if (p.startsWith('packages/vertex-forager/src/vertex_forager/core/')) labels.add('area:core');
              if (p.startsWith('packages/vertex-forager/src/vertex_forager/writers/')) labels.add('area:writers');
              if (p.startsWith('packages/vertex-forager/src/vertex_forager/routers/')) labels.add('area:routers');
              if (p.startsWith('packages/vertex-forager/src/vertex_forager/providers/')) labels.add('area:clients');
            }
            if (labels.size === 0) {
              core.info('No matching paths for fallback labels');
              return;
            }
            await github.rest.issues.addLabels({
              owner, repo, issue_number: number, labels: Array.from(labels),
            });
      - name: Labeler outcome gate
        if: ${{ always() }}
        run: |
          echo "labeler_outcome=${{ steps.labeler.outcome }}"
          echo "fallback_outcome=${{ steps.fallback.outcome }}"
          if [ "${{ steps.labeler.outcome }}" = "failure" ] && [ "${{ steps.fallback.outcome }}" != "success" ]; then
            echo "Both actions/labeler and fallback labeler failed"
            exit 1
          fi
