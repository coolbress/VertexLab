name: docs-deploy

on:
  push:
    branches: ["main"]
    paths:
      - "mkdocs.yml"
      - "packages/vertex-forager/docs/**"
      - "packages/vertex-forager/src/**"
      - "packages/vertex-forager/pyproject.toml"
      - "packages/vertex-forager/**"
      - "README.md"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v4 pinned
      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b  # v5 pinned
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v5 pinned
        with:
          python-version: "3.10"
      - uses: astral-sh/setup-uv@e06108dd0aef18192324c70427afc47652e63a82  # v5 pinned
      - name: Set up Python virtual environment
        run: uv venv
      - name: Install docs deps
        run: |
          uv pip install -q 'mkdocs>=1.6.0' 'mkdocs-material>=9.5.0' 'mkdocstrings[python]>=0.25.0' 'pymdown-extensions>=10.8'
      - name: Build site
        run: uv run mkdocs build --strict --site-dir ./_site
      - name: Upload artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b  # v3 pinned
        with:
          path: ./_site
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e  # v4 pinned
