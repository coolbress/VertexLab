name: PR Body Guard
on:
  pull_request_target:
    types: [opened, edited, reopened, ready_for_review]
concurrency:
  group: pr-body-guard-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true
permissions:
  contents: read
  pull-requests: write
jobs:
  guard:
    if: ${{ github.actor != 'dependabot[bot]' && github.actor != 'github-actions[bot]' && github.event.pull_request.user.login != 'dependabot[bot]' && github.event.pull_request.user.login != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Validate PR body sections
        id: validate
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd
        with:
          script: |
            const pr = context.payload.pull_request;
            if (!pr) {
              core.setOutput('missing', '[]');
              return;
            }
            // Skip guard for bot-authored PRs as a final safeguard
            const author = (pr.user && pr.user.login) || '';
            if (author === 'dependabot[bot]' || author === 'github-actions[bot]') {
              core.info('Bot-authored PR detected; skipping PR Body Guard checks.');
              return;
            }
            const body = (pr.body || '').toLowerCase();
            const required = [
              '## summary',
              '## linked issue',
              '## type of change',
              '## changes',
              '## verification',
              '## security considerations',
              '## risk & rollback',
              '## checklist'
            ];
            const missing = required.filter(h => !body.includes(h));
            core.setOutput('missing', JSON.stringify(missing));
            if (missing.length > 0) {
              const marker = '[PR Body Guard]';
              const msg = [
                marker,
                'PR body is missing required sections:',
                ...missing.map(s => `- ${s.replace(/^##\s*/,'')}`),
                '',
                'Please fill out the repository PR template sections for consistency.'
              ].join('\n');
              const owner = context.repo.owner;
              const repo = context.repo.repo;
              const comments = await github.rest.issues.listComments({
                owner, repo, issue_number: pr.number, per_page: 100
              });
              const existing = comments.data.find(c => (c.user?.type === 'Bot' || c.user?.login?.includes('github-actions')) && (c.body || '').includes(marker));
              if (existing) {
                await github.rest.issues.updateComment({
                  owner, repo, comment_id: existing.id, body: msg
                });
              } else {
                await github.rest.issues.createComment({
                  owner, repo, issue_number: pr.number, body: msg
                });
              }
              core.setFailed(`Missing sections: ${missing.join(', ')}`);
            }
