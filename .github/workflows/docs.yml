name: docs-ci

on:
  pull_request:
    paths:
      - "mkdocs.yml"
      - "docs/**"
      - "packages/**/mkdocs.yml"
      - "packages/vertex-forager/docs/**"
      - ".github/workflows/docs.yml"
      - "packages/vertex-forager/pyproject.toml"
      - "packages/vertex-forager/src/**"
  push:
    branches: ["main"]
    paths:
      - "mkdocs.yml"
      - "docs/**"
      - "packages/**/mkdocs.yml"
      - "packages/vertex-forager/docs/**"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5 pinned
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v5 pinned
        with:
          python-version: "3.10"
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v5 pinned
      - name: Set up Python virtual environment
        run: uv venv
      - name: Install docs deps
        run: |
          uv pip install -q 'mkdocs>=1.6.0' 'mkdocs-material>=9.5.0' 'mkdocstrings[python]>=0.25.0' 'pymdown-extensions>=10.8' 'mkdocs-monorepo-plugin>=0.6.0'
      - name: Install vertex-forager (for mkdocstrings import)
        run: uv pip install -e packages/vertex-forager
      - name: Build docs (strict)
        run: NO_MKDOCS_2_WARNING=1 uv run mkdocs build --strict
  link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5 pinned
      - name: Link Checker
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411  # v1 pinned
        with:
          args: --verbose --no-progress --max-concurrency 8 --exclude '^\s*$' --exclude '^(yfinance://|mailto:)' 'docs/**/*.md' 'packages/vertex-forager/docs/**/*.md' 'README.md'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
