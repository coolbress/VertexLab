---
name: Attach Release Assets

'on':
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Existing release tag to attach assets to"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.10"

      - name: Setup uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78

      - name: Clean dist
        run: rm -rf dist/vertex-forager/

      - name: Build wheel/sdist (vertex-forager)
        run: |
          OUT="${GITHUB_WORKSPACE}/dist/vertex-forager"
          rm -rf "$OUT"
          mkdir -p "$OUT"
          uv build packages/vertex-forager --out-dir "$OUT"
          ls -l "$OUT"

      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ inputs.tag_name }}
          files: dist/vertex-forager/*
          fail_on_unmatched_files: true
