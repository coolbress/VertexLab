name: "Technical Task"
description: "Refactor, tests, build/CI and other non‑feature work"
title: "[chore]: "
labels: ["task", "needs-triage"]
assignees: []
body:
  - type: textarea
    id: objective
    attributes:
      label: Objective
      placeholder: What and why
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope / Out of Scope
      placeholder: Clearly list included and excluded items
  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: Update Issue Forms (bug/feature/docs) with Priority/Severity and clearer prompts
        - label: Update PR template (title convention + sections + checklist)
        - label: Verify auto‑labeler and PR guard alignment
        - label: Update CODEOWNERS for docs/mkdocs.yml
        - label: Configure pre‑commit hooks (ruff/format, mypy, lychee)
        - label: [optional] Add detect‑secrets with a baseline
        - label: Ensure Docs CI (mkdocs --strict, link checker, actionlint) passes
  - type: textarea
    id: validation
    attributes:
      label: Validation
      placeholder: Tests/benchmarks/CI gates, acceptance checks
  - type: textarea
    id: risk
    attributes:
      label: Risk & Rollback
      placeholder: Identify risks and how to revert safely
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - P1
        - P2
        - P3
        - P4
