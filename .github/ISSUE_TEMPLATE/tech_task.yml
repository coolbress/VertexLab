name: "Technical Task"
description: "Refactor, tests, build/CI and other non‑feature work"
title: "chore: <short summary>"
labels: ["task", "needs-triage"]
assignees: []
body:
  - type: textarea
    id: objective
    attributes:
      label: Objective
      placeholder: What and why
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope / Out of Scope
      placeholder: Clearly list included and excluded items
  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: Tests added or updated
        - label: Docs updated (if applicable)
        - label: CI gates pass locally
        - label: Rollback plan documented in Risk & Rollback
  - type: textarea
    id: validation
    attributes:
      label: Validation
      placeholder: Tests/benchmarks/CI gates, acceptance checks
  - type: textarea
    id: risk
    attributes:
      label: Risk & Rollback
      placeholder: Identify risks and how to revert safely
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - P1
        - P2
        - P3
        - P4
