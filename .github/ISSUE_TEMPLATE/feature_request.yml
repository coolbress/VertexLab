name: Feature request
description: Suggest an idea for this project
title: "feat: <short summary>"
labels:
  - enhancement
body:
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - P1
        - P2
        - P3
        - P4
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: What is the problem or limitation?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the solution and scope.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Define completion conditions and measurable outcomes
      placeholder: e.g., New API returns schema X; docs updated; tests passing
    validations:
      required: true
  - type: textarea
    id: out_of_scope
    attributes:
      label: Out of scope
      description: Clarify explicitly excluded items to avoid scope creep
