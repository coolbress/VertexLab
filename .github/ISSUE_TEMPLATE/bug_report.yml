name: Bug report
description: Report a bug to help us improve
title: "bug: <short summary>"
labels:
  - bug
body:
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - critical
        - high
        - medium
        - low
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - P1
        - P2
        - P3
        - P4
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? Include logs or screenshots if helpful.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: List precise steps and sample inputs to reproduce.
      placeholder: "1) ...\n2) ...\n3) ..."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs/Artifacts
      description: Redact secrets before attaching logs, screenshots, or files
      placeholder: Relevant snippets or links
    validations:
      required: false
  - type: checkboxes
    id: context_flags
    attributes:
      label: Additional Context
      options:
        - label: Regression from a previous working version
        - label: Temporary workaround exists
  - type: input
    id: env_os
    attributes:
      label: OS
      placeholder: "macOS 14.5 / Ubuntu 22.04 ..."
  - type: input
    id: env_python
    attributes:
      label: Python
      placeholder: "3.10.14"
  - type: input
    id: env_version
    attributes:
      label: Vertex Forager version
      placeholder: "0.1.0"
  - type: checkboxes
    id: checks
    attributes:
      label: Pre‑submission checks
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true
        - label: I can reproduce using the latest main or release.
          required: true
