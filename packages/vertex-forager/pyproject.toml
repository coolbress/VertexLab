[project]
name = "vertex-forager"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
authors = [
    { name = "coolbress", email = "81678322+coolbress@users.noreply.github.com" }
]
requires-python = ">=3.10"
dependencies = [
    "duckdb>=1.4.4",
    "httpx>=0.28.1",
    "nest-asyncio>=1.6.0",
    "pandas>=2.3.3",
    "polars>=1.37.1",
    "psutil>=7.2.2",
    "pyarrow>=23.0.0",
    "pydantic>=2.12.5",
    "python-dotenv>=1.2.1",
    "requests>=2.32.5",
    "tenacity>=9.1.4",
    "tqdm>=4.67.3",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"

[build-system]
requires = ["uv_build>=0.9.27,<0.10.0"]
build-backend = "uv_build"

[dependency-groups]
dev = [
    "ipykernel>=7.1.0",
    "jupyterlab>=4.5.3",
    "numpy>=2.2.6",
    "pytest>=9.0.2",
    "pytest-asyncio>=1.3.0",
]
