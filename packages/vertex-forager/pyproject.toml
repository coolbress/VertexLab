[project]
name = "vertex-forager"
version = "0.5.2" # x-release-please-version
description = "High-performance asynchronous financial data scraping engine using Polars and DuckDB."
readme = "README.md"
authors = [
    { name = "coolbress", email = "81678322+coolbress@users.noreply.github.com" }
]
requires-python = ">=3.10"
license = "Apache-2.0"
license-files = ["LICENSE"]
classifiers = [
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3 :: Only",
    "Programming Language :: Python :: 3.10",
    "License :: OSI Approved :: Apache Software License",
    "Operating System :: OS Independent",
    "Typing :: Typed",
]
urls = { "Documentation" = "https://coolbress.github.io/VertexLab/", "Changelog" = "https://github.com/coolbress/VertexLab/blob/main/CHANGELOG.md", "Issues" = "https://github.com/coolbress/VertexLab/issues", "Source" = "https://github.com/coolbress/VertexLab" }
dependencies = [
    "click>=8.3.1,<9.0.0",
    "duckdb>=1.4.4,<2.0.0",
    "httpx>=0.28.1,<1.0.0",
    "typing-extensions>=4.10.0,<5.0.0",
    "nest-asyncio>=1.6.0,<2.0.0",
    "pandas>=2.3.3,<3.0.0",
    "polars>=1.37.1,<2.0.0",
    "psutil>=7.2.2,<8.0.0",
    "pyarrow>=23.0.0,<24.0.0",
    "pydantic>=2.12.5,<3.0.0",
    "python-dotenv>=1.2.1,<2.0.0",
    "tenacity>=9.1.4,<10.0.0",
    "tqdm>=4.67.3,<5.0.0",
    "yfinance>=1.1.0,<2.0.0",
]

[project.scripts]
vertex-forager = "vertex_forager.cli:main"

[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
markers = [
    "integration: integration tests",
]

[build-system]
requires = ["uv_build>=0.9.27,<0.11.0"]
build-backend = "uv_build"

[project.optional-dependencies]
notebook = [
    "ipywidgets>=8.1.8",
    "ipython>=8.0.0,<9.0.0",
]
docs = [
    "mkdocs>=1.6.0",
    "mkdocs-material>=9.5.0",
    "mkdocstrings[python]>=0.25.0",
    "pymdown-extensions>=10.8",
]

[dependency-groups]
dev = [
    "ipykernel>=7.1.0,<8.0.0",
    "jupyterlab>=4.5.3,<5.0.0",
    "numpy>=2.2.6,<3.0.0",
    "pytest>=8.3.4,<10.0.0",
    "pytest-asyncio>=1.3.0,<2.0.0",
]

[tool.coverage.run]
branch = true
source = [
    "packages/vertex-forager/src/vertex_forager/core",
    "packages/vertex-forager/src/vertex_forager/clients",
    "packages/vertex-forager/src/vertex_forager/writers",
    "packages/vertex-forager/src/vertex_forager/routers"
]

[tool.coverage.report]
fail_under = 80
show_missing = true
skip_covered = true
