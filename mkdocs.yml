site_name: VertexLab Docs
site_url: https://coolbress.github.io/VertexLab/
repo_url: https://github.com/coolbress/VertexLab
edit_uri: edit/main/docs/

docs_dir: docs
site_dir: site

theme:
  name: material
  language: en
  font: false
  features:
    - content.code.copy
    - navigation.tabs
    - navigation.top
    - search.highlight
    - search.suggest
  palette:
    - scheme: default
      primary: blue
      accent: amber
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: blue
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

plugins:
  - search
  - monorepo
  - mkdocstrings:
      handlers:
        python:
          paths:
            - packages/vertex-forager/src
          options:
            docstring_style: google
            show_source: false
            merge_init_into_class: true
            warn_unresolved: false

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - tables
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

nav:
  - Overview: index.md
  - Policies:
      - CI Security: ci-security.md
      - CI Node Runtime Policy: explanation/ci-node-policy.md
    - Labels Policy: explanation/labels-policy.md
  - Components:
      - vertex-forager: '!include packages/vertex-forager/mkdocs.yml'
